{% extends 'master_admin/base.html' %}
{% block title %}Edit Student | Admin{% endblock %}
{% block content %}

<h2 class="text-white fw-bold mb-4">Edit Profile: Student #{{ s.id }}</h2>

<div class="card-dark p-4 mx-auto" style="max-width: 600px;">
  <form method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label text-muted">Enrollment Number (Read Only)</label>
      <input type="text" class="form-control bg-dark text-muted border-secondary" value="{{ s.enrollment_number }}" disabled>
    </div>
    <div class="mb-3">
      <label class="form-label text-white">Full Name</label>
      <input type="text" name="name" class="form-control bg-dark text-white border-secondary" value="{{ s.name }}" required>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label text-white">Assigned Hostel</label>
        <input type="text" name="assigned_hostel" class="form-control bg-dark text-white border-secondary" value="{{ s.assigned_hostel }}">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label text-white">Room Number</label>
        <input type="text" name="room_number" class="form-control bg-dark text-white border-secondary" value="{{ s.room_number }}">
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label text-white">Mobile Number</label>
      <input type="text" name="mobile" class="form-control bg-dark text-white border-secondary" value="{{ s.mobile }}">
    </div>
    <div class="d-flex justify-content-between">
      <a href="{% url 'admin_search_users' %}" class="btn btn-outline-secondary px-4 fw-bold">Cancel</a>
      <button type="submit" class="btn btn-danger px-5 fw-bold">FORCE SAVE PROFILE</button>
    </div>
  </form>
</div>

{% endblock %}
