<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HCMS | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0f0c29, #1a1a2e, #16213e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    /* ─── Animated background particles ─── */
    .bg-particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-particles::before,
    .bg-particles::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 12s ease-in-out infinite;
    }
    .bg-particles::before {
      width: 400px; height: 400px;
      background: #7f5af0;
      top: -100px; left: -100px;
    }
    .bg-particles::after {
      width: 350px; height: 350px;
      background: #2cb5e8;
      bottom: -80px; right: -80px;
      animation-delay: -6s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* ─── Card ─── */
    .landing-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }

    .landing-card {
      padding: 48px 40px;
      background: rgba(42, 42, 64, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(127, 90, 240, 0.15);
      border-radius: 20px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.4),
        0 0 80px rgba(127, 90, 240, 0.08);
      text-align: center;
      color: #e0e0e0;
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Logo / Title ─── */
    .landing-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #7f5af0, #2cb5e8);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 20px rgba(127, 90, 240, 0.3);
    }
    .landing-icon svg {
      width: 32px;
      height: 32px;
      fill: #fff;
    }

    .landing-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #e0e0e0, #b8b8d0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .landing-subtext {
      font-size: 0.92rem;
      margin-bottom: 32px;
      color: #9a9ab0;
      line-height: 1.5;
    }

    /* ─── Error text above button ─── */
    .login-error-text {
      display: none;
      font-size: 0.85rem;
      color: #ff6b6b;
      margin-bottom: 16px;
      padding: 10px 16px;
      background: rgba(255, 107, 107, 0.08);
      border: 1px solid rgba(255, 107, 107, 0.2);
      border-radius: 10px;
      line-height: 1.4;
    }
    .login-error-text.visible {
      display: block;
      animation: fadeSlideIn 0.4s ease both;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Login Button ─── */
    .login-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #7f5af0, #6a40e4);
      border: none;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 12px;
      color: #fff;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 20px rgba(127, 90, 240, 0.3);
      cursor: pointer;
      font-family: inherit;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(127, 90, 240, 0.45);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .login-btn svg {
      width: 20px;
      height: 20px;
    }

    .domain-hint {
      margin-top: 24px;
      font-size: 0.78rem;
      color: #6a6a80;
      line-height: 1.5;
    }

    /* ─── Toast notification ─── */
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-120px);
      background: rgba(255, 107, 107, 0.95);
      color: #fff;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 0.92rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 8px 32px rgba(255, 107, 107, 0.3);
      z-index: 9999;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      text-align: center;
      max-width: 90vw;
      white-space: nowrap;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ─── Responsive ─── */
    @media (max-width: 500px) {
      .landing-card { padding: 36px 24px; }
      .landing-title { font-size: 1.3rem; }
      .login-btn { padding: 12px 24px; font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="bg-particles"></div>

  <!-- Toast popup for errors -->
  <div class="toast" id="errorToast"></div>

  <div class="landing-wrapper">
    <div class="landing-card">
      <div class="landing-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
        </svg>
      </div>

      <div class="landing-title">Hostel Complaint Management System</div>
      <p class="landing-subtext">Login with your authorized college or staff email to access your dashboard.</p>

      <!-- Error message — shown only when login fails -->
      <div class="login-error-text" id="loginErrorText">
        Login failed. Please try again or contact support.
      </div>

      <a href="{% url 'google_login_redirect' %}" class="login-btn" id="loginBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          <path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Login with Google
      </a>

      <div class="domain-hint">
        Authorized domains: @mitsgwl.ac.in &middot; @mitsgwalior.in &middot; Staff Gmail
      </div>
    </div>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const errorType = params.get('error');

      if (errorType) {
        // Show toast popup
        const toast = document.getElementById('errorToast');
        toast.textContent = 'Only @mitsgwalior.in and @mitsgwl.ac.in domains are allowed.';
        setTimeout(() => toast.classList.add('show'), 100);
        setTimeout(() => toast.classList.remove('show'), 3500);

        // Show error text above login button
        document.getElementById('loginErrorText').classList.add('visible');

        // Clean the URL so refreshing doesn't re-show the error
        if (window.history.replaceState) {
          window.history.replaceState({}, document.title, window.location.pathname);
        }
      }
    })();
  </script>
</body>
</html>
