{% extends 'warden/base.html' %}
{% block title %}Edit Student Housing | Warden{% endblock %}

{% block content %}
<style>
    .edit-card {
        max-width: 600px;
        margin: auto;
        background: var(--bg-card, #2a2a40);
        border-radius: 16px;
        padding: 40px;
        border: 1px solid var(--border-color, #3a3a55);
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .form-label {
        color: var(--text-secondary, #cfcfcf);
        font-weight: 600;
        margin-bottom: 8px;
    }
    .student-info-box {
        background: rgba(255,255,255,0.05);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 30px;
        border: 1px dashed rgba(255,255,255,0.1);
    }
</style>

<div class="edit-card">
    <h3 class="text-white fw-bold mb-4">Edit Student Housing</h3>
    
    <div class="student-info-box">
        <div class="row">
            <div class="col-4 text-muted small text-uppercase">Name</div>
            <div class="col-8 fw-bold">{{ name }}</div>
        </div>
        <hr class="my-2 opacity-10">
        <div class="row">
            <div class="col-4 text-muted small text-uppercase">Enrollment</div>
            <div class="col-8">{{ enrollment }}</div>
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label for="floor_number" class="form-label">Floor Number</label>
            <input type="text" id="floor_number" name="floor_number" 
                   class="form-control bg-black border-secondary text-white p-3" 
                   value="{{ student.floor_number }}" placeholder="e.g. 1" required>
        </div>
        
        <div class="mb-4">
            <label for="room_number" class="form-label">Room Number</label>
            <input type="text" id="room_number" name="room_number" 
                   class="form-control bg-black border-secondary text-white p-3" 
                   value="{{ student.room_number }}" placeholder="e.g. 101" required>
        </div>

        <div class="d-flex gap-3 pt-3">
            <button type="submit" class="btn btn-purple flex-grow-1 p-3 fw-bold">Save Changes</button>
            <a href="{% url 'manage_students' %}?q={{ enrollment }}" class="btn btn-outline-secondary p-3">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
