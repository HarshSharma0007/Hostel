{% extends 'warden/base.html' %}
{% block title %}Warden Dashboard{% endblock %}

{% block content %}
<style>
  .dashboard-card {
    max-width: 800px;
    margin: 40px auto;
    padding: 40px;
    background: var(--bg-card, #2a2a40);
    border-radius: 16px;
    box-shadow: var(--card-shadow, 0 0 40px rgba(138, 43, 226, 0.3));
    border: 1px solid var(--border-color, #3a3a55);
    transition: background 0.3s ease, box-shadow 0.3s ease;
  }

  .dashboard-title {
    font-size: 1.8rem;
    font-weight: 600;
    text-align: center;
    margin-bottom: 30px;
    color: var(--text-heading, #ffffff);
  }

  .form-note {
    color: var(--text-secondary, #cfcfcf);
    text-align: center;
    margin-bottom: 20px;
  }

  form {
    margin-top: 20px;
    text-align: center;
  }

  button {
    background-color: #7f5af0;
    border: none;
    padding: 10px 20px;
    font-size: 1rem;
    border-radius: 8px;
    color: #fff;
    transition: background-color 0.3s ease;
  }

  button:hover {
    background-color: #6a40e4;
  }

  .back-link {
    display: block;
    margin: 30px;
    font-size: 1.1rem;
    color: #fff;
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 8px;
    background-color: #7f5af0;
    text-align: center;
    transition: background-color 0.3s ease;
  }

  .back-link:hover {
    background-color: #6a40e4;
  }
</style>

<div class="dashboard-card">
  <div class="dashboard-title">📤 Upload Student CSV</div>
  <p class="form-note">Please upload a CSV file with student details (Enrollment Number, Full Name, Email, Branch).</p>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Upload</button>
  </form>

  <a href="{% url 'warden_dashboard' %}" class="back-link">⬅️ Back to Dashboard</a>
</div>
{% endblock %}
