

{% block content %}
<style>
  .dashboard-card {
    max-width: 800px;
    margin: 40px auto;
    padding: 40px;
    background: #2a2a40;
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(138, 43, 226, 0.3);
  }

  .dashboard-title {
    font-size: 1.8rem;
    font-weight: 600;
    text-align: center;
    margin-bottom: 30px;
    color: #ffffff;
  }

  .action-link {
    display: block;
    margin: 15px 0;
    font-size: 1.1rem;
    color: #e0e0e0;
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 8px;
    background-color: #7f5af0;
    text-align: center;
    transition: background-color 0.3s ease;
  }

  .action-link:hover {
    background-color: #6a40e4;
  }

    .logout-link {
    display: block;
    margin: 30px;
    font-size: 1.1rem;
    color: #cce0e0;
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 8px;
    background-color: #7f5af0;
    text-align: center;
    transition: background-color 0.3s ease;
  }

  .logout-link:hover {
    text-decoration: underline;
  }
</style>

<div class="dashboard-card">
  <div class="dashboard-title">🏢 Warden Dashboard</div>

  <a href="{% url 'upload_csv' %}" class="action-link">📤 Upload Student CSV</a>
  <a href="{% url 'complaint_list' %}" class="action-link">📋 View All Complaints</a>

  <a href="{% url 'logout' %}" class="logout-link">🔒 Logout</a>
</div>
{% endblock %}
